apiVersion: apps/v1
kind: Deployment # <--- Đã sửa lại đúng tên gọi là Deployment
metadata:
  name: phongthuy-frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
      - name: ghcr-login-secret
      containers:
      - name: frontend
        image: ghcr.io/oppathang/my-app/phongthuy-frontend:v5
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30081
