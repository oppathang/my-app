apiVersion: apps/v1
kind: Deployment
metadata:
  name: phongthuy-frontend
  namespace: default # <--- THÊM DÒNG NÀY VÀO ĐÂY
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/oppathang/my-app/phongthuy-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: default # <--- VÀ THÊM CẢ VÀO ĐÂY NỮA
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30081
