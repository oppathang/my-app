apiVersion: apps/v1
kind: Deployment
metadata:
name: phongthuy-frontend
spec:
replicas: 1
selector:
matchLabels:
app: frontend
template:
metadata:
labels:
app: frontend
spec:
containers:
- name: frontend
# Tên image này sẽ do Jenkins tự động điền/cập nhật
image: ghcr.io/oppathang/my-app/phongthuy-frontend:latest
imagePullPolicy: Always

ports:
- containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
name: frontend-service
spec:
type: NodePort
selector:
app: frontend
ports:
- port: 80
targetPort: 80
nodePort: 30081 # Cổng để bạn truy cập vào giao diện web
